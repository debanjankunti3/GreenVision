<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GreenVision</title>
    <link rel="icon" type="image/svg+xml" href="../static/images/logo.svg">
    
    <!-- Bootstrap CSS (Updated to stable release link) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Custom Gradient and Text Color Overrides -->
    <style>
      .custom-nav-gradient {
        background: linear-gradient(90deg, #9cd390 0%, #46ce9a 30%, #3ca0cc 70%, #4149cd 100%) !important;
      }
      /* Ensures text stands out clearly over the bright background gradient */
      .custom-nav-gradient .nav-link {
        color: rgba(255, 255, 255, 0.9) !important;
        font-weight: 600;
        text-transform: capitalize; /* Automatically capitalizes "suggestions" */
      }
      .custom-nav-gradient .nav-link:hover,
      .custom-nav-gradient .nav-link.active {
        color: #ffffff !important;
      }
    </style>
  </head>
  <body>
    
    <!-- Added 'custom-nav-gradient' and 'navbar-dark' to make the hamburger menu toggle white -->
    <nav class="navbar navbar-expand-lg custom-nav-gradient navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="../static/images/logo.png" alt="GreenVision Logo" height="50" width="140px" class="d-inline-block hover-">
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        
        <!-- Added 'align-items-center' to vertically center your text links with your logo image -->
        <div class="collapse navbar-collapse align-items-center" id="navbarNavAltMarkup">
          <div class="navbar-nav ms-auto">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
            <a class="nav-link" href="#our_team">About us</a>
            <a class="nav-link" href="/classifier">Garbage Classifier</a>
            <a class="nav-link" href="#suggestions">suggestions</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="w-100">
      <img src="../static/images/background.jpg" alt="Background" class="img-fluid w-100">
    </div>

    <!-- Bootstrap Bundle JS (Updated to stable release link) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
