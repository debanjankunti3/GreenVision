<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenVision - Suggestions</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    
</head>
<body>

<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center p-3">

<div class="w-100" style="max-width: 600px;">
    
    <div class="card border-0 shadow-sm p-4 p-md-5 rounded-4 bg-white">
        
        <div class="mb-4">
            <!-- <span class="badge bg-success-subtle text-success mb-2 px-3 py-2 rounded-pill fw-semibold">Feedback Loop</span> -->
            <h2 class="fw-bold tracking-tight mb-2">Share Your Suggestions</h2>
            <p class="text-muted small">Help us fine-tune Team GreenVision's waste classification and management intelligence.</p>
        </div>

        <form action="/suggestions" method="POST">
            
            <div class="mb-4">
                <label for="name" class="form-label fw-semibold text-secondary small">Full Name</label>
                <input type="text" class="form-control form-control-lg w-100 rounded-3" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="mb-4">
                <label for="email" class="form-label fw-semibold text-secondary small">Email Address</label>
                <input type="email" class="form-control form-control-lg w-100 rounded-3" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="mb-4">
                <label for="category" class="form-label fw-semibold text-secondary small">Suggestion Category</label>
                <select class="form-select form-select-lg w-100 rounded-3" id="category" name="category" required>
                    <option value="" disabled selected>Choose a category...</option>
                    <option value="Model Accuracy">Model/Classification Accuracy</option>
                    <option value="UI Improvement">App Design & Layout</option>
                    <option value="New Feature">Requested Feature</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="message" class="form-label fw-semibold text-secondary small">Your Message</label>
                <textarea class="form-control w-100 rounded-3" id="message" name="message" rows="4" placeholder="Tell us how we can improve..." required></textarea>
            </div>

            <div class="mb-4">
                <button type="submit" class="btn btn-success btn-lg w-100 fw-bold rounded-3 py-3">Submit Suggestion</button>
            </div>

            <div class="text-center">
                <a href="/" class="text-decoration-none text-muted small d-inline-flex align-items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                    </svg>
                    Back to Dashboard
                </a>
            </div>

        </form>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
